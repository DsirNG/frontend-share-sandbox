services:
  frontend-share-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: frontend-share-sandbox:latest
    container_name: frontend-share-sandbox
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 30003
    ports:
      - "127.0.0.1:30003:30003"
    volumes:
      - frontend-share-sandbox-storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - common-network

volumes:
  frontend-share-sandbox-storage:
    name: frontend-share-sandbox-storage

networks:
  common-network:
    external: true